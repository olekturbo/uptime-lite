<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uptime Lite</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Header ───────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-icon { font-size: 1.3rem; }
    .header-right { display: flex; align-items: center; gap: 0.75rem; }
    .refresh-badge {
      font-size: 0.75rem;
      color: #475569;
      background: #0f172a;
      padding: 0.25rem 0.6rem;
      border-radius: 9999px;
      border: 1px solid #334155;
    }

    /* ── Stats bar ────────────────────────────────────────────── */
    .stats-bar {
      display: flex;
      gap: 0.75rem;
      padding: 0.65rem 2rem;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.3rem 0.75rem;
      background: #0f172a;
      border-radius: 9999px;
      border: 1px solid #334155;
    }
    .stat-val { font-size: 0.95rem; font-weight: 700; }
    .stat-lbl { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-up   .stat-val { color: #22c55e; }
    .stat-down .stat-val { color: #ef4444; }

    /* ── Layout ───────────────────────────────────────────────── */
    .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── Target grid ──────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
    }

    /* ── Target card ──────────────────────────────────────────── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-left-width: 3px;
      border-radius: 0.75rem;
      padding: 1.15rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .card-up   { border-left-color: #22c55e; }
    .card-down { border-left-color: #ef4444; }
    .card-unknown { border-left-color: #475569; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      display: block;
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-url {
      display: block;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.72rem;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }
    .badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 0.3rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-up   { background: rgba(34,197,94,0.15); color: #22c55e; }
    .badge-down { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-unknown { background: rgba(148,163,184,0.12); color: #94a3b8; }

    .card-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      padding: 0.65rem;
      background: #0f172a;
      border-radius: 0.5rem;
    }
    .metric { text-align: center; }
    .metric-val { display: block; font-size: 0.82rem; font-weight: 600; }
    .metric-lbl {
      display: block;
      font-size: 0.62rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.1rem;
    }

    .card-footer {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.25rem;
      border-top: 1px solid #0f172a;
    }

    /* ── Buttons ──────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      text-decoration: none;
      line-height: 1;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #4f46e5; }
    .btn-secondary { background: #1e293b; color: #f1f5f9; border: 1px solid #334155; }
    .btn-secondary:hover:not(:disabled) { background: #334155; }
    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
      font-size: 0.78rem;
      padding: 0.3rem 0.65rem;
    }
    .btn-ghost:hover:not(:disabled) { background: #334155; color: #f1f5f9; }
    .btn-danger {
      background: transparent;
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
      font-size: 0.78rem;
      padding: 0.3rem 0.65rem;
    }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.1); }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Status dot ───────────────────────────────────────────── */
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.3rem;
    }
    .dot-up {
      background: #22c55e;
      box-shadow: 0 0 0 0 rgba(34,197,94,0.4);
      animation: pulse-green 2s infinite;
    }
    .dot-down    { background: #ef4444; }
    .dot-unknown { background: #475569; }
    .dot-lg  { width: 13px; height: 13px; margin-top: 0; }
    .dot-inline {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 0.3rem;
      flex-shrink: 0;
    }

    @keyframes pulse-green {
      0%   { box-shadow: 0 0 0 0   rgba(34,197,94,0.4); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0);   }
      100% { box-shadow: 0 0 0 0   rgba(34,197,94,0);   }
    }

    /* ── Empty state ──────────────────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      color: #475569;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; display: block; }
    .empty h3   { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; color: #64748b; }
    .empty p    { font-size: 0.85rem; }

    /* ── Detail view ──────────────────────────────────────────── */
    .detail-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .detail-url {
      color: #6366f1;
      text-decoration: none;
      font-family: monospace;
      font-size: 0.82rem;
    }
    .detail-url:hover { text-decoration: underline; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 1rem 1.25rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      margin: 1.25rem 0;
    }
    .status-row-text { font-size: 1rem; font-weight: 700; }
    .sep { color: #334155; }

    .panel {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }
    .panel-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    /* ── History table ────────────────────────────────────────── */
    .history-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    .history-table th {
      text-align: left;
      padding: 0.45rem 0.75rem;
      color: #475569;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #334155;
    }
    .history-table td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #0f172a; }
    .history-table tbody tr:last-child td { border-bottom: none; }
    .history-table tbody tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Modal ────────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fade-in 0.15s ease;
    }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 100%;
      max-width: 440px;
      animation: slide-up 0.2s ease;
    }
    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .modal-head h2 { font-size: 1.05rem; font-weight: 700; }
    .modal-close {
      background: none;
      border: none;
      color: #64748b;
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem;
    }
    .modal-close:hover { color: #f1f5f9; }
    .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.85rem; }
    .form-group label { font-size: 0.78rem; font-weight: 500; color: #94a3b8; }
    .form-group input {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.5rem 0.75rem;
      color: #f1f5f9;
      font-size: 0.88rem;
    }
    .form-group input:focus { outline: none; border-color: #6366f1; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .form-error { font-size: 0.78rem; color: #ef4444; min-height: 1.1em; margin-bottom: 0.5rem; }

    /* ── Toast ────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.7rem 1.2rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast-success { background: #22c55e; color: #fff; }
    .toast-error   { background: #ef4444; color: #fff; }

    /* ── Spinner ──────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Utility ──────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .text-green { color: #22c55e; }
    .text-red   { color: #ef4444; }
    .text-muted { color: #94a3b8; }
    .text-xs    { font-size: 0.75rem; }

    /* ── Animations ───────────────────────────────────────────── */
    @keyframes fade-in  { from { opacity: 0; } }
    @keyframes slide-up { from { transform: translateY(12px); opacity: 0; } }

    /* ── Responsive ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      .header   { padding: 0.75rem 1rem; }
      .stats-bar { padding: 0.5rem 1rem; gap: 0.5rem; }
      .main     { padding: 1rem; }
      .grid     { grid-template-columns: 1fr; }
      .refresh-badge { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="brand">
      <span class="brand-icon">⏱</span>
      Uptime Lite
    </div>
    <div class="header-right">
      <span id="refresh-badge" class="refresh-badge">Refreshing…</span>
      <button id="back-btn"  class="btn btn-secondary hidden">← Back</button>
      <button id="add-btn"   class="btn btn-primary">+ Add Target</button>
    </div>
  </header>

  <!-- ── Stats bar ──────────────────────────────────────────── -->
  <div id="stats-bar" class="stats-bar">
    <div class="stat">
      <span id="stat-total" class="stat-val">—</span>
      <span class="stat-lbl">Total</span>
    </div>
    <div class="stat stat-up">
      <span id="stat-up" class="stat-val">—</span>
      <span class="stat-lbl">Up</span>
    </div>
    <div class="stat stat-down">
      <span id="stat-down" class="stat-val">—</span>
      <span class="stat-lbl">Down</span>
    </div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="main">
    <div id="view-dashboard"></div>
    <div id="view-detail"   class="hidden"></div>
  </main>

  <!-- ── Add-target modal ───────────────────────────────────── -->
  <div id="overlay" class="overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-head">
        <h2 id="modal-title">Add Target</h2>
        <button id="modal-close" class="modal-close" aria-label="Close">×</button>
      </div>
      <form id="add-form">
        <div class="form-group">
          <label for="f-name">Name</label>
          <input id="f-name" name="name" type="text"
                 placeholder="My API" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="f-url">URL</label>
          <input id="f-url" name="url" type="url"
                 placeholder="https://api.example.com/health" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-interval">Interval (s)</label>
            <input id="f-interval" name="interval" type="number"
                   min="10" max="86400" value="60">
          </div>
          <div class="form-group">
            <label for="f-timeout">Timeout (s)</label>
            <input id="f-timeout" name="timeout" type="number"
                   min="1" max="60" value="10">
          </div>
        </div>
        <p id="form-error" class="form-error" role="alert"></p>
        <button id="submit-btn" type="submit" class="btn btn-primary btn-full">
          Add Target
        </button>
      </form>
    </div>
  </div>

  <!-- ── Toast ──────────────────────────────────────────────── -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
